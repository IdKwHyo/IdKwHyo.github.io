
<style>
  body { margin: 0; background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const TEXT = "I love you ";
const LAYERS = 6;
const POINTS_PER_LAYER = 140;

function heartPoint(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
  return { x, y };
}

function draw(ts) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2 - 20;
  const scale = Math.min(canvas.width, canvas.height) / 50;

  for (let layer = 0; layer < LAYERS; layer++) {
    const layerScale = scale * (0.72 + layer * 0.065);
    const alpha = 0.28 + layer * 0.1;
    const tiltX = Math.sin(ts * 0.0008 + layer * 0.4) * 0.18;
    const tiltY = Math.cos(ts * 0.0006 + layer * 0.3) * 0.1;

    for (let i = 0; i < POINTS_PER_LAYER; i++) {
      const t = (i / POINTS_PER_LAYER) * Math.PI * 2;
      const p = heartPoint(t);

      const px3d = p.x + p.y * tiltX;
      const py3d = p.y + p.x * tiltY;

      const px = cx + px3d * layerScale;
      const py = cy + py3d * layerScale;

      const charIndex = (i + Math.floor(ts * 0.05)) % TEXT.length;
      const char = TEXT[charIndex];

      const angle = t + tiltX + ts * 0.0003;
      const fontSize = 10 + layer * 1.2;
      const glowAmount = (Math.sin(ts * 0.002 + i * 0.1) + 1) / 2;

      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(angle + Math.PI / 2);

      ctx.font = `${fontSize}px Georgia, serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const r = Math.round(234 + glowAmount * 20);
      const g = Math.round(128 + glowAmount * 30);
      const b = Math.round(176 + glowAmount * 40);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.fillText(char, 0, 0);

      ctx.restore();
    }
  }
}

let lastTs = 0;
function animate(ts) {
  draw(ts);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
